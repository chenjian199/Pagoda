# Pagoda Rust 工具链配置
#
# 固定 stable 频道，确保团队和 CI 使用相同的工具链版本。
# 更新方法：将 channel 改为具体版本号（如 "1.85.0"）或继续用 "stable"
# 自动拉取最新 stable。
#
# 最低支持版本（MSRV）：1.82（在 Cargo.toml 中以 rust-version 声明）

[toolchain]
channel = "stable"
components = [
    "rustfmt",
    "clippy",
    "rust-src",          # IDE 跳转支持
    "llvm-tools-preview", # cargo-llvm-cov 覆盖率工具
]
