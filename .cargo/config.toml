# Pagoda Cargo 本地配置。
# 此文件影响 workspace 内所有 crate 的构建行为。

[build]
# tokio-console 和 runtime/metrics/tokio_perf.rs 需要 Tokio unstable metrics API。
rustflags = ["--cfg", "tokio_unstable"]

[target.x86_64-unknown-linux-gnu]
# 面向 Haswell（2013）及更新机器，启用 x86-64-v3/AVX2，同时保留 Tokio unstable metrics API。
rustflags = ["-C", "target-cpu=x86-64-v3", "--cfg", "tokio_unstable"]

[target.aarch64-unknown-linux-gnu]
# 面向 Graviton 2 / Ampere Altra 及更新机器，启用 NEON 向量和 LSE atomics，同时保留 Tokio unstable metrics API。
rustflags = ["-C", "target-cpu=neoverse-n1", "--cfg", "tokio_unstable"]

[env]
# 静态链接 fastokens tokenizer 使用的 pcre2 C 库，避免依赖系统 libpcre2/pkg-config。
PCRE2_SYS_STATIC = "1"

# 构建时检测 protoc（若系统未安装，给出友好提示）。
# 开发者可通过 PROTOC 环境变量覆盖路径。
# PROTOC = "/usr/bin/protoc"  # 取消注释以固定路径。