#
# cargo-deny 配置
# 文档：https://embarkstudios.github.io/cargo-deny/
#
# 运行：cargo deny check
#       make deps-check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
# 排除开发工具相关 crate
exclude-dev = false

# ─────────────────────────────────────────────────────────────────────
# 许可证检查
# ─────────────────────────────────────────────────────────────────────
[licenses]
version = 2

# 允许的 SPDX 许可证标识符列表
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]

# 对无许可证 crate 的处理（deny = 拒绝，allow = 接受，warn = 警告）
unlicensed = "deny"

# 发现许可证异常时的处理
copyleft = "warn"

# 私有 crate（无许可证要求）豁免
private = { ignore = true }

# 许可证豁免列表（用于已知合规但 cargo-deny 误判的 crate）
exceptions = [
    # 示例（取消注释并填入实际需要豁免的 crate）:
    # { allow = ["GPL-2.0"], name = "some-gpl-crate", version = "*" },
]

# ─────────────────────────────────────────────────────────────────────
# 安全漏洞检查
# ─────────────────────────────────────────────────────────────────────
[advisories]
version = 2

# RustSec advisory database 路径（CI 中自动下载）
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# 对未修复漏洞的处理
vulnerability = "deny"

# 对已取消（unmaintained）crate 的处理
unmaintained = "warn"

# 对通知类别的处理
notice = "warn"

# 对草稿漏洞的处理
unsound = "warn"

# 已知漏洞忽略列表（应附带说明和到期日期）
ignore = [
    # 示例：
    # { id = "RUSTSEC-2023-XXXX", reason = "Not affected due to feature X, revisit 2025-01-01" },
]

# ─────────────────────────────────────────────────────────────────────
# 重复依赖检查
# ─────────────────────────────────────────────────────────────────────
[bans]
# 允许同一依赖存在的版本数（超过则报错）
multiple-versions = "warn"

# 完全禁止的 crate
deny = [
    # 安全风险
    { name = "openssl-sys", reason = "使用 rustls 代替 openssl（避免 C 依赖和 CVE 风险）" },

    # 废弃 crate
    { name = "failure", reason = "使用 anyhow / thiserror 代替" },
    { name = "error-chain", reason = "使用 anyhow / thiserror 代替" },

    # 潜在的 soundness 问题
    { name = "ouroboros", reason = "存在已知 soundness 问题" },
]

# 跳过版本冲突检查的 crate（用于暂时接受的重复版本）
skip = [
    # 示例：
    # { name = "windows-sys", version = "0.45" },
]

# 允许特定 crate 的 wildcard 依赖
wildcards = "allow"

# ─────────────────────────────────────────────────────────────────────
# 包来源检查
# ─────────────────────────────────────────────────────────────────────
[sources]
# 不允许使用未知来源的 crate
unknown-registry = "deny"
unknown-git = "deny"

# 允许的 crate 来源
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# 允许使用 git 依赖的仓库（内部 crate 或未发布的 patch）
allow-git = [
    # 示例：
    # "https://github.com/pagoda-corp/some-internal-crate",
]
