#
# 发布流水线
#
# 触发条件：推送语义化版本 tag（如 v0.1.0、v1.2.3-beta.1）
#
# 发布步骤：
#   1. 完整 CI 校验（复用 ci.yml 的逻辑）
#   2. 编译 release 产物（当前以 Rust library 为主）
#   3. 生成 cargo doc 文档并上传
#   4. 生成 SBOM（软件物料清单）
#   5. 创建 GitHub Release，附加产物

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROTOC: /usr/bin/protoc

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: 提取版本号并验证 tag 格式
  # ═══════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # 判断是否预发布（含 - 则为预发布，如 1.0.0-beta.1）
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing version: $VERSION (prerelease: $([[ $VERSION == *-* ]] && echo true || echo false))"

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' lib/runtime/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION ✓"

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: 全量 CI 校验（确保发布的是通过 CI 的代码）
  # ═══════════════════════════════════════════════════════════════════
  ci-checks:
    name: CI Checks
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy check
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests (unit)
        run: cargo test --lib

      - name: Build (release)
        run: cargo build --release --all-features

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: 生成文档并发布到 GitHub Pages
  # ═══════════════════════════════════════════════════════════════════
  docs:
    name: Publish Documentation
    needs: [ci-checks]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "--cfg docsrs"
        run: cargo doc --no-deps --all-features

      - name: Add redirect index.html
        run: |
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=pagoda_runtime/index.html">
          </head>
          <body>Redirecting to <a href="pagoda_runtime/index.html">pagoda-runtime docs</a>...</body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ═══════════════════════════════════════════════════════════════════
  # Job 4: 生成 SBOM（软件物料清单）
  # ═══════════════════════════════════════════════════════════════════
  sbom:
    name: Generate SBOM
    needs: [ci-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cargo cyclonedx --format json --output-file sbom.json
          echo "SBOM generated:"
          cat sbom.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Components: {len(d.get(\"components\",[]))}')"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.json

  # ═══════════════════════════════════════════════════════════════════
  # Job 5: 创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: [prepare, ci-checks, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}

      - name: Generate changelog from git log
        id: changelog
        run: |
          # 获取上一个 tag（用于生成 changelog）
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1 || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -50)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -50)
          fi

          # 多行输出写入 GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Pagoda Runtime ${{ needs.prepare.outputs.version }}"
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          body: |
            ## Pagoda Runtime ${{ needs.prepare.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Assets
            - `sbom.json` — CycloneDX Software Bill of Materials

            ### Documentation
            API documentation is available at the GitHub Pages deployment.

            ### Installation
            ```toml
            [dependencies]
            pagoda-runtime = "${{ needs.prepare.outputs.version }}"
            ```

      - name: Upload SBOM to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: sbom.json
          asset_name: sbom-${{ needs.prepare.outputs.version }}.json
          asset_content_type: application/json
