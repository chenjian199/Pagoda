# cargo-deny 配置文件
#
# 用途：检查 Rust 依赖的安全漏洞、许可证、重复版本和来源可信度。
# 文档：https://embarkstudios.github.io/cargo-deny/
# 运行：cargo deny check

[graph]
# Pagoda 当前主要支持的 Linux 目标平台。
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# dev-dependencies 也参与检查，避免测试工具引入高风险依赖。
exclude-dev = false

[licenses]
version = 2

# 未声明许可证的 crate 直接拒绝。
unlicensed = "deny"

# Copyleft 许可证先警告，由人工确认是否允许引入。
copyleft = "warn"

# 私有 crate 不要求声明许可证。
private = { ignore = true }

# 项目允许的许可证白名单。
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# 已知合规但无法自动识别的许可证例外，新增时必须写明原因。
exceptions = []

[advisories]
version = 2

# RustSec 漏洞库。CI 或本地首次运行时会自动拉取。
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# 未修复安全漏洞阻断构建；维护状态和潜在 soundness 问题先警告。
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
unsound = "warn"

# 忽略项必须附带原因和复查日期，不允许长期无说明豁免。
ignore = []

[bans]
# 多版本依赖先警告，后续稳定后可提升为 deny。
multiple-versions = "warn"

# 允许通配符版本依赖。若项目后续进入发布阶段，建议改为 warn 或 deny。
wildcards = "allow"

# 禁止引入的 crate。
deny = [
    { name = "error-chain", reason = "已废弃，使用 anyhow 或 thiserror 代替" },
    { name = "failure", reason = "已废弃，使用 anyhow 或 thiserror 代替" },
    { name = "openssl-sys", reason = "优先使用 rustls，避免 OpenSSL C 依赖和相关 CVE 风险" },
    { name = "ouroboros", reason = "存在已知 soundness 风险，避免在核心运行时中使用" },
]

# 暂时允许的重复版本依赖。新增项必须写明原因，并定期清理。
skip = []

[sources]
# 拒绝未知 registry 和未声明允许的 git 来源。
unknown-registry = "deny"
unknown-git = "deny"

# 允许的 crate registry。
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# 允许的 git 依赖来源。需与 Cargo.toml 中的 patch/git 依赖保持一致。
allow-git = [
    "https://github.com/lightseekorg/smg",
]
