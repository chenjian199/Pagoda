# Pagoda 代码格式规范
# 文档：https://rust-lang.github.io/rustfmt/

edition = "2021"

# 最大行宽（提交检查时强制执行）
max_width = 100

# 注释宽度
comment_width = 100
wrap_comments = true

# import 分组规则
imports_granularity = "Crate"   # 同一 crate 的 use 折叠为一组
group_imports = "StdExternalCrate"  # std → external → crate 三段分组

# struct 字段对齐
struct_field_align_threshold = 30

# 函数参数换行策略
fn_params_layout = "Tall"

# 允许 single-line if/else（短小条件体）
single_line_if_else_max_width = 50

# match 臂宽度
match_arm_blocks = true
match_block_trailing_comma = true

# 保留 trailing comma
trailing_comma = "Vertical"

# 字符串不强制换行
format_strings = false

# 宏调用格式
format_macro_matchers = true
